<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecurePass – Premium Password Suite</title>
    <!-- // import antigravity  ← xkcd Easter egg joke -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
<link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="canvas-container"></div>
    <div class="container">
      <header>
        <div class="brand">
          <svg
            width="36"
            height="36"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="color: #4d94ff"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <h1>SecurePass</h1>
        </div>
        <div class="subtitle-wrapper">
          <p class="subtitle">Advanced Password Suite</p>
        </div>
      </header>

      <!-- Strength Analyzer Section -->
      <div class="premium-card">
        <div class="section-label">Real-time Analyzer</div>
        <div class="input-wrapper">
          <input
            type="password"
            id="inputCheck"
            placeholder="Verify your existing password..."
            autocomplete="new-password"
          />
        </div>

        <div class="strength-status">
          <span id="strength-label">Waiting...</span>
          <span class="crack-estimate" id="crack-time">Crack Time: —</span>
        </div>

        <div class="progress-track">
          <div id="strength-bar" class="progress-fill"></div>
        </div>

        <div class="criteria-grid">
          <div class="criterion" id="crit-len">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M20 6L9 17l-5-5"></path>
            </svg>
            Min. 12 Characters
          </div>
          <div class="criterion" id="crit-up">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M20 6L9 17l-5-5"></path>
            </svg>
            Uppercase Letters
          </div>
          <div class="criterion" id="crit-low">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M20 6L9 17l-5-5"></path>
            </svg>
            Lowercase Letters
          </div>
          <div class="criterion" id="crit-num">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M20 6L9 17l-5-5"></path>
            </svg>
            Numerical Digits
          </div>
          <div class="criterion" id="crit-sym">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M20 6L9 17l-5-5"></path>
            </svg>
            Special Symbols
          </div>
          <div class="criterion active" id="crit-unique">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M20 6L9 17l-5-5"></path>
            </svg>
            Not Breached/Common
          </div>
        </div>
      </div>

      <!-- Generator Section -->
      <div class="premium-card">
        <div class="section-label">Entropy Generator</div>

        <div class="control-group">
          <div class="label-row">
            <span>Character Count</span>
            <span class="length-val" id="lengthDisplay">16</span>
          </div>
          <input type="range" id="lengthSlider" min="8" max="64" value="16" />
        </div>

        <div class="check-row">
          <label class="toggle-item">
            <span>Uppercase</span>
            <input type="checkbox" id="genUp" checked />
            <div class="switch"></div>
          </label>
          <label class="toggle-item">
            <span>Lowercase</span>
            <input type="checkbox" id="genLow" checked />
            <div class="switch"></div>
          </label>
          <label class="toggle-item">
            <span>Numbers</span>
            <input type="checkbox" id="genNum" checked />
            <div class="switch"></div>
          </label>
          <label class="toggle-item">
            <span>Symbols</span>
            <input type="checkbox" id="genSym" checked />
            <div class="switch"></div>
          </label>
        </div>

        <button class="primary-btn" id="generateBtn">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 2v6h-6"></path>
            <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
            <path d="M3 22v-6h6"></path>
            <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
          </svg>
          GENERATE SECURE PASSWORD
        </button>

        <div class="generated-zone" id="resultContainer">
          <div class="display-field" id="resultField">Click to generate...</div>
          <button class="icon-btn" id="copyResult" title="Copy to clipboard">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path
                d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
              ></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- History Section -->
      <div class="premium-card history-card">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
          "
        >
          <div class="section-label" style="margin-bottom: 0">
            Generation History
          </div>
          <button class="clear-history" id="clearBtn">Clear Session</button>
        </div>

        <div class="history-feed" id="historyFeed">
          <!-- Items dynamically added -->
        </div>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
